<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
     <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <!-- ════════════════════════════════════════
         HOME / JOB FEED
    ════════════════════════════════════════ -->
    <section class="page active" id="page-home">

      <!-- Hero Banner -->
      <div class="hero-banner">
        <div class="hero-inner">
          <div class="hero-eyebrow"><i class="fa-solid fa-star"></i> 2,400+ jobs added this week</div>
          <h1 class="hero-heading">Find Your <span>Dream Job</span><br>Faster with AI</h1>
          <p class="hero-description">Smart job matching, AI-powered CV builder, and career guidance — all in one place.</p>
          <div class="hero-search-bar">
            <input class="hero-search-input" id="hero-search-input" placeholder="Search jobs, companies, skills...">
            <button class="hero-search-btn" onclick="heroSearch()">Search</button>
          </div>
          <div class="hero-stats-row">
            <div><div class="hero-stat-number">12K+</div><div class="hero-stat-label">Active Jobs</div></div>
            <div><div class="hero-stat-number">3.8K</div><div class="hero-stat-label">Companies</div></div>
            <div><div class="hero-stat-number">94%</div><div class="hero-stat-label">Match Rate</div></div>
          </div>
        </div>

        <!-- ── Animated IT Student Illustration ── -->
        <div class="hero-animation-wrap">
          <svg class="hero-scene-svg" viewBox="0 0 420 360" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <!-- Glow filter for screen -->
              <filter id="screenGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="6" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <!-- Clip for laptop screen -->
              <clipPath id="screenClip">
                <rect x="148" y="118" width="130" height="88" rx="4"/>
              </clipPath>
              <!-- Radial gradient for desk surface -->
              <radialGradient id="deskGrad" cx="50%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#1e2a5e" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#0f1c40" stop-opacity="1"/>
              </radialGradient>
              <!-- Gradient for laptop body -->
              <linearGradient id="laptopBodyGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#2a3a7a"/>
                <stop offset="100%" stop-color="#1a2660"/>
              </linearGradient>
              <!-- Screen gradient -->
              <linearGradient id="screenBgGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0a0e2a"/>
                <stop offset="100%" stop-color="#0d1a3e"/>
              </linearGradient>
              <!-- Floating card gradient -->
              <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4f6ef7"/>
                <stop offset="100%" stop-color="#6c4ef7"/>
              </linearGradient>
            </defs>

            <!-- ── AMBIENT GLOW ORBS (background) ── -->
            <ellipse cx="210" cy="260" rx="160" ry="60" fill="rgba(79,110,247,0.08)"/>
            <circle cx="330" cy="80" r="55" fill="rgba(108,78,247,0.1)"/>
            <circle cx="90" cy="160" r="40" fill="rgba(79,110,247,0.08)"/>

            <!-- ── DESK SURFACE ── -->
            <ellipse cx="210" cy="285" rx="175" ry="28" fill="url(#deskGrad)" opacity="0.8"/>
            <!-- Desk edge highlight -->
            <ellipse cx="210" cy="282" rx="174" ry="8" fill="rgba(79,110,247,0.18)"/>

            <!-- ── CHAIR (behind figure) ── -->
            <rect x="185" y="258" width="50" height="10" rx="5" fill="#1a2a6e" opacity="0.9"/>
            <rect x="195" y="268" width="30" height="26" rx="4" fill="#1a2a6e"/>
            <!-- Chair back -->
            <rect x="188" y="222" width="44" height="46" rx="6" fill="#162060" opacity="0.85"/>
            <rect x="191" y="225" width="38" height="40" rx="4" fill="#1e2a7a" opacity="0.7"/>

            <!-- ── BODY / TORSO ── -->
            <!-- Hoodie body - deep navy blue matching portal -->
            <rect x="178" y="208" width="64" height="54" rx="12" fill="#1a2a6e"/>
            <!-- Hoodie front panel / zipper detail -->
            <rect x="207" y="212" width="6" height="46" rx="3" fill="#223280" opacity="0.6"/>
            <!-- Hoodie pocket strings -->
            <line x1="196" y1="228" x2="200" y2="248" stroke="#4f6ef7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <line x1="224" y1="228" x2="220" y2="248" stroke="#4f6ef7" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <!-- Hoodie logo badge (TB) -->
            <rect x="196" y="220" width="24" height="14" rx="4" fill="#4f6ef7" opacity="0.85"/>
            <text x="208" y="230" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="sans-serif">TB</text>

            <!-- ── NECK ── -->
            <rect x="202" y="192" width="16" height="20" rx="6" fill="#f0c8a0"/>

            <!-- ── HEAD (slightly tilted towards screen) ── -->
            <g class="head-tilt">
              <!-- Hair - dark with slight shine -->
              <ellipse cx="210" cy="173" rx="26" ry="24" fill="#1a0a05"/>
              <!-- Hair shine -->
              <ellipse cx="204" cy="165" rx="10" ry="6" fill="#2d1408" opacity="0.7" transform="rotate(-15, 204, 165)"/>
              <!-- Face -->
              <ellipse cx="210" cy="178" rx="22" ry="23" fill="#f0c8a0"/>
              <!-- Hair top overlap -->
              <ellipse cx="210" cy="158" rx="24" ry="15" fill="#1a0a05"/>
              <!-- Side hair -->
              <ellipse cx="190" cy="172" rx="8" ry="14" fill="#1a0a05"/>
              <ellipse cx="230" cy="172" rx="8" ry="14" fill="#1a0a05"/>
              <!-- Ear left -->
              <ellipse cx="189" cy="178" rx="4" ry="5" fill="#e8b890"/>
              <!-- Ear right -->
              <ellipse cx="231" cy="178" rx="4" ry="5" fill="#e8b890"/>
              <!-- Glasses frame -->
              <rect x="196" y="173" width="16" height="10" rx="4" fill="none" stroke="#1a1a2e" stroke-width="2"/>
              <rect x="214" y="173" width="16" height="10" rx="4" fill="none" stroke="#1a1a2e" stroke-width="2"/>
              <line x1="212" y1="178" x2="214" y2="178" stroke="#1a1a2e" stroke-width="2"/>
              <!-- Glasses lens tint (screen reflection) -->
              <rect x="197" y="174" width="14" height="8" rx="3" fill="#4f6ef7" opacity="0.15" class="screen-reflect"/>
              <rect x="215" y="174" width="14" height="8" rx="3" fill="#4f6ef7" opacity="0.15" class="screen-reflect"/>
              <!-- Eyes (looking at screen - slightly down) -->
              <ellipse cx="204" cy="179" rx="3" ry="2.5" fill="#1a0a05"/>
              <ellipse cx="222" cy="179" rx="3" ry="2.5" fill="#1a0a05"/>
              <!-- Eye shine -->
              <circle cx="205" cy="178" r="1" fill="white" opacity="0.8"/>
              <circle cx="223" cy="178" r="1" fill="white" opacity="0.8"/>
              <!-- Nose -->
              <ellipse cx="213" cy="186" rx="2" ry="2.5" fill="#e0a880" opacity="0.6"/>
              <!-- Mouth - slight smile -->
              <path d="M207 192 Q213 196 219 192" fill="none" stroke="#c08060" stroke-width="1.5" stroke-linecap="round"/>
              <!-- Headphones -->
              <path d="M189 168 Q190 152 210 150 Q230 152 231 168" fill="none" stroke="#1a2a6e" stroke-width="4" stroke-linecap="round"/>
              <rect x="185" y="167" width="9" height="14" rx="4" fill="#4f6ef7"/>
              <rect x="226" y="167" width="9" height="14" rx="4" fill="#4f6ef7"/>
            </g>

            <!-- ── ARMS ── -->
            <!-- Left arm -->
            <path d="M185 218 Q174 230 170 252" fill="none" stroke="#1a2a6e" stroke-width="16" stroke-linecap="round"/>
            <ellipse cx="170" cy="254" rx="9" ry="7" fill="#f0c8a0"/>
            <!-- Right arm -->
            <path d="M235 218 Q246 230 250 252" fill="none" stroke="#1a2a6e" stroke-width="16" stroke-linecap="round"/>
            <ellipse cx="250" cy="254" rx="9" ry="7" fill="#f0c8a0"/>

            <!-- ── LAPTOP BASE ── -->
            <rect x="142" y="255" width="136" height="14" rx="6" fill="#1e2a6e"/>
            <rect x="148" y="252" width="124" height="8" rx="4" fill="#2a3a80"/>
            <!-- Trackpad -->
            <rect x="196" y="257" width="28" height="8" rx="3" fill="#2a3a80" opacity="0.7"/>

            <!-- ── LAPTOP SCREEN BODY ── -->
            <rect x="145" y="110" width="130" height="98" rx="8" fill="url(#laptopBodyGrad)"/>
            <!-- Screen bezel -->
            <rect x="148" y="113" width="124" height="92" rx="6" fill="#0a0e28"/>
            <!-- Screen face -->
            <rect x="150" y="115" width="120" height="88" rx="5" fill="url(#screenBgGrad)" filter="url(#screenGlow)"/>

            <!-- ── LAPTOP SCREEN CONTENT (TalentBridge UI) ── -->
            <g clip-path="url(#screenClip)">
              <!-- Header bar on screen -->
              <rect x="148" y="115" width="130" height="16" rx="0" fill="#0f1635"/>
              <!-- Nav dots -->
              <circle cx="157" cy="123" r="3" fill="#e24b4a" opacity="0.9"/>
              <circle cx="165" cy="123" r="3" fill="#e8a020" opacity="0.9"/>
              <circle cx="173" cy="123" r="3" fill="#0d9e75" opacity="0.9"/>
              <!-- Logo text on screen -->
              <text x="183" y="126" fill="#8fa8ff" font-size="7" font-weight="700" font-family="sans-serif">TalentBridge</text>

              <!-- Screen body -->
              <rect x="148" y="131" width="130" height="75" fill="#080d28"/>

              <!-- Search bar on screen -->
              <rect x="154" y="134" width="118" height="12" rx="6" fill="#1a2260" opacity="0.9"/>
              <text x="163" y="143" fill="#4f6ef7" font-size="7" font-family="sans-serif">🔍</text>
              <text x="173" y="143" fill="rgba(255,255,255,0.4)" font-size="6.5" font-family="sans-serif">Senior React Developer...</text>

              <!-- Job cards on screen (animated typing) -->
              <!-- Card 1 -->
              <rect x="154" y="150" width="118" height="22" rx="4" fill="#111c50"/>
              <rect x="157" y="153" width="14" height="14" rx="3" fill="#4f6ef7" opacity="0.8"/>
              <rect x="175" y="155" width="52" height="4" rx="2" fill="#8fa8ff" opacity="0.9"/>
              <rect x="175" y="162" width="36" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
              <!-- Match badge -->
              <rect x="244" y="154" width="22" height="9" rx="4" fill="#0d9e75" opacity="0.9"/>
              <text x="255" y="161" text-anchor="middle" fill="white" font-size="5.5" font-weight="700" font-family="sans-serif" class="match-text">96%</text>

              <!-- Card 2 (slightly faded = below fold) -->
              <rect x="154" y="176" width="118" height="22" rx="4" fill="#111c50" opacity="0.7"/>
              <rect x="157" y="179" width="14" height="14" rx="3" fill="#6c4ef7" opacity="0.7"/>
              <rect x="175" y="181" width="44" height="4" rx="2" fill="#8fa8ff" opacity="0.7"/>
              <rect x="175" y="188" width="30" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
              <rect x="244" y="180" width="22" height="9" rx="4" fill="#0d9e75" opacity="0.7"/>
              <text x="255" y="187" text-anchor="middle" fill="white" font-size="5.5" font-weight="700" font-family="sans-serif">91%</text>

              <!-- Cursor blinking on search bar -->
              <rect x="220" y="137" width="1.5" height="7" rx="1" fill="#8fa8ff" class="cursor-blink" opacity="1"/>

              <!-- AI match bar (animated) -->
              <rect x="154" y="202" width="118" height="8" rx="4" fill="#0f1a44"/>
              <rect x="154" y="202" width="90" height="8" rx="4" fill="#4f6ef7" class="ai-progress-bar"/>
              <text x="158" y="208" fill="white" font-size="5" font-family="sans-serif" font-weight="600">AI Match Score</text>
              <text x="260" y="208" fill="#8fa8ff" font-size="5" font-family="sans-serif" font-weight="700">76%</text>
            </g>

            <!-- Laptop hinge -->
            <rect x="145" y="207" width="130" height="6" rx="3" fill="#141e55"/>

            <!-- ── FLOATING CARDS (outside laptop, ambient UI) ── -->
            <!-- Floating card: Job Match -->
            <g class="float-card-1">
              <rect x="52" y="130" width="82" height="42" rx="8" fill="url(#cardGrad1)" opacity="0.92" filter="url(#softGlow)"/>
              <text x="62" y="148" fill="white" font-size="8" font-weight="700" font-family="sans-serif">✓ Match Found</text>
              <text x="62" y="160" fill="rgba(255,255,255,0.75)" font-size="7" font-family="sans-serif">React Developer</text>
              <rect x="62" y="163" width="45" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
            </g>

            <!-- Floating card: AI Insight -->
            <g class="float-card-2">
              <rect x="294" y="100" width="90" height="46" rx="8" fill="#0f1a44" opacity="0.95" filter="url(#softGlow)"/>
              <rect x="294" y="100" width="90" height="46" rx="8" fill="none" stroke="rgba(79,110,247,0.5)" stroke-width="1"/>
              <text x="304" y="116" fill="#8fa8ff" font-size="7" font-weight="700" font-family="sans-serif">🤖 AI Insight</text>
              <text x="304" y="127" fill="rgba(255,255,255,0.65)" font-size="6" font-family="sans-serif">Profile strength:</text>
              <rect x="304" y="131" width="70" height="5" rx="2.5" fill="#1a2a6e"/>
              <rect x="304" y="131" width="58" height="5" rx="2.5" fill="#4f6ef7" class="strength-bar"/>
              <text x="304" y="143" fill="#0d9e75" font-size="6" font-weight="600" font-family="sans-serif">94% — Excellent</text>
            </g>

            <!-- Floating notification pill -->
            <g class="float-notif">
              <rect x="270" y="220" width="110" height="28" rx="14" fill="#0d9e75" opacity="0.95"/>
              <text x="280" y="238" fill="white" font-size="7.5" font-weight="600" font-family="sans-serif">🎉 3 new matches today!</text>
            </g>

            <!-- Floating code snippet (IT student vibe) -->
            <g class="float-code" opacity="0.75">
              <rect x="30" y="218" width="96" height="50" rx="8" fill="#0a0e24" opacity="0.95"/>
              <rect x="30" y="218" width="96" height="50" rx="8" fill="none" stroke="rgba(79,110,247,0.3)" stroke-width="1"/>
              <text x="38" y="233" fill="#6c4ef7" font-size="6.5" font-family="monospace">const</text>
              <text x="58" y="233" fill="#8fa8ff" font-size="6.5" font-family="monospace">dream =</text>
              <text x="38" y="243" fill="#0d9e75" font-size="6.5" font-family="monospace">'TalentBridge'</text>
              <text x="38" y="253" fill="rgba(255,255,255,0.4)" font-size="6" font-family="monospace">// job found ✓</text>
              <!-- cursor blink in code -->
              <rect x="104" y="246" width="1.2" height="7" rx="1" fill="#4f6ef7" class="cursor-blink2"/>
            </g>

            <!-- Stars/sparkles ambient -->
            <circle cx="90" cy="108" r="2" fill="#8fa8ff" class="twinkle-1" opacity="0.8"/>
            <circle cx="330" cy="158" r="1.5" fill="#4f6ef7" class="twinkle-2" opacity="0.7"/>
            <circle cx="68" cy="200" r="1.5" fill="#6c4ef7" class="twinkle-3" opacity="0.6"/>
            <circle cx="348" cy="240" r="2" fill="#8fa8ff" class="twinkle-1" opacity="0.5"/>
            <circle cx="115" cy="285" r="1.5" fill="#4f6ef7" class="twinkle-2" opacity="0.4"/>

            <!-- WiFi signal icon (IT student) -->
            <g opacity="0.5" transform="translate(350, 60)">
              <path d="M0 14 Q10 4 20 14" fill="none" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 18 Q10 12 16 18" fill="none" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round"/>
              <circle cx="10" cy="22" r="2" fill="#4f6ef7"/>
            </g>
          </svg>
        </div>
      </div>

      <!-- Category Chips -->
      <div class="category-chips-row" id="home-chips">
        <button class="category-chip active" onclick="setCategory('all',this)">All Jobs</button>
        <button class="category-chip"        onclick="setCategory('tech',this)">💻 Technology</button>
        <button class="category-chip"        onclick="setCategory('medical',this)">🏥 Medical</button>
        <button class="category-chip"        onclick="setCategory('teaching',this)">📚 Teaching</button>
        <button class="category-chip"        onclick="setCategory('civil',this)">🏗 Civil / Eng</button>
        <button class="category-chip"        onclick="setCategory('finance',this)">💼 Finance</button>
        <button class="category-chip"        onclick="setCategory('design',this)">🎨 Design</button>
        <button class="category-chip"        onclick="setCategory('legal',this)">⚖ Legal</button>
        <button class="category-chip"        onclick="setCategory('logistics',this)">📦 Logistics</button>
      </div>

      <!-- Search & Sort Row -->
      <div class="flex-between mb-16" style="gap:12px;flex-wrap:wrap">
        <div class="search-input-wrap" style="min-width:220px;max-width:360px">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="main-search" placeholder="Filter jobs by title, skill, company...">
        </div>
        <div class="flex-between gap-12">
          <div style="font-size:14px;color:var(--text-secondary)">Showing <strong id="job-count">0</strong> jobs</div>
          <select id="sort-select" style="width:auto;padding:8px 12px;border-radius:9px;border:1px solid var(--border-mid);font-family:var(--font-body);font-size:13px;outline:none;cursor:pointer">
            <option value="relevant">Most Relevant</option>
            <option value="newest">Newest First</option>
            <option value="salary-high">Salary: High to Low</option>
            <option value="salary-low">Salary: Low to High</option>
          </select>
        </div>
      </div>

      <!-- Job Grid -->
      <div class="job-grid" id="job-feed-grid"></div>
    </section>
    <script src="app.js"></script>
</body>
</html>
