<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await initCommon();

    // Redirect employer to their dashboard — wait for Firebase to settle first
    function checkEmployerRedirect() {
      var u = (typeof AppState !== 'undefined' && AppState.currentUser)
             || (function(){ try { var s = localStorage.getItem('tb_session'); return s ? JSON.parse(s) : null; } catch(e){} return null; })();
      if (u && u.role === 'employer') {
        window.location.href = 'Employer_dashboard.html';
        return true;
      }
      return false;
    }
    if (!checkEmployerRedirect()) {
      // Also check once Firebase auth resolves (handles page-refresh case)
      document.addEventListener('fbReady', function() { checkEmployerRedirect(); }, { once: true });
    }

    // Render job feed (async — hits TiDB)
    await filterAndRender();

    // Live search
    var mainSearch = document.getElementById('main-search');
    if (mainSearch) {
      mainSearch.addEventListener('input', function(e) {
        AppState.searchQuery = e.target.value;
        filterAndRender();
      });
    }
    // Sort dropdown (async — getAllJobs hits TiDB)
    var sortDropdown = document.getElementById('sort-select');
    if (sortDropdown) {
      sortDropdown.addEventListener('change', async function(e) {
        var sortedJobs = await getAllJobs();
        if (AppState.activeCategory !== 'all') sortedJobs = sortedJobs.filter(function(j){ return j.category === AppState.activeCategory; });
        if (e.target.value === 'newest')      sortedJobs.sort(function(){ return 0; });
        if (e.target.value === 'salary-high') sortedJobs.sort(function(a,b){ return (b.salaryMax||0)-(a.salaryMax||0); });
        if (e.target.value === 'salary-low')  sortedJobs.sort(function(a,b){ return (a.salaryMin||0)-(b.salaryMin||0); });
        await renderJobFeed(sortedJobs);
      });
    }
    // Hero search enter key
    var heroSearchField = document.getElementById('hero-search-input');
    if (heroSearchField) {
      heroSearchField.addEventListener('keydown', function(e) { if (e.key === 'Enter') heroSearch(); });
    }
  });
</script>
</body>
</html>
