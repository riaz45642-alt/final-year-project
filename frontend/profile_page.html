<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentBridge — My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/jobs.css">
  <link rel="stylesheet" href="css/profile_page.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ── Extra profile view styles ── */
    .profile-links-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .profile-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.22);
      font-size: 12.5px;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s;
    }
    .profile-link-btn:hover { background: rgba(255,255,255,0.24); }

    .profile-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .profile-info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary, #888);
    }
    .profile-info-item i { color: var(--accent, #4f6ef7); width: 14px; text-align: center; }
    .profile-info-item a { color: var(--accent, #4f6ef7); text-decoration: none; }
    .profile-info-item a:hover { text-decoration: underline; }

    .bio-text {
      font-size: 13.5px;
      color: var(--text-secondary, #888);
      line-height: 1.65;
      padding: 12px 0;
      border-top: 1px solid var(--border, rgba(0,0,0,.07));
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- ═══ TOAST CONTAINER ═══ -->
<div id="toast-container"></div>

<!-- ═══ AUTH MODAL ═══ -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box" id="auth-modal-box"></div>
</div>

<!-- ═══ TOP NAV ═══ -->
<nav class="top-nav">
  <button class="mobile-menu-toggle" id="mobile-menu-toggle" onclick="toggleMobileSidebar()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <div class="site-logo site-logo-center" onclick="window.location.href='dashboard.html'">Talent<span>Bridge</span></div>
  <div class="nav-links">
    <div class="nav-divider"></div>
    <div id="nav-logged-out" class="nav-auth-buttons">
      <button class="nav-link-btn" onclick="openAuth('login')">Sign In</button>
      <button class="nav-link-btn primary" onclick="openAuth('signup')">Sign Up Free</button>
    </div>
    <div id="nav-logged-in" class="nav-user-menu hidden">
      <div class="user-avatar-btn" id="nav-avatar-btn" onclick="window.location.href='profile_page.html'" title="My Profile">
        <span id="nav-avatar-initials">AK</span>
      </div>
    </div>
  </div>
</nav>

<!-- Mobile sidebar overlay -->
<div class="mobile-sidebar-overlay" id="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>

<!-- ═══ APP LAYOUT ═══ -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Main</div>
    <button class="sidebar-nav-item" onclick="window.location.href='dashboard.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-house"></i></span>Job Feed</button>
    <button class="sidebar-nav-item" data-role="seeker" onclick="window.location.href='Save_job.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-bookmark"></i></span>Saved Jobs<span class="badge" id="sb-saved-count">0</span></button>
    <button class="sidebar-nav-item" data-role="seeker" onclick="window.location.href='My_applications.html';closeMobileSidebar()"><span class="nav-icon"></span>My Applications<span class="badge" id="sb-applied-count">0</span></button>

    <div class="sidebar-section-label">Tools</div>
    <button class="sidebar-nav-item" onclick="window.location.href='cv_generator.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-file"></i></span>CV Generator</button>

        <!-- ═══ SWITCH VIEW CARD ═══ -->
    <div class="sidebar-switch-card hidden" id="sidebar-switch-card">
      <div class="sidebar-switch-label">Switch View</div>
      <div class="sidebar-switch-inner">
        <button class="switch-pill" id="switch-pill-js" onclick="handleRoleToggle(false)">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span>Job Seeker</span>
        </button>
        <input type="checkbox" id="role-toggle-checkbox" style="display:none" onchange="handleRoleToggle(this.checked)">
        <button class="switch-pill" id="switch-pill-em" onclick="handleRoleToggle(true)">
          <i class="fa-solid fa-briefcase"></i>
          <span>Employer</span>
        </button>
      </div>
    </div>

<div class="sidebar-section-label">Account</div>
    <button class="sidebar-nav-item active" onclick="window.location.href='profile_page.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-user"></i></span>My Profile</button>
    <button class="sidebar-nav-item" data-role="employer" onclick="window.location.href='Employer_dashboard.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-address-card"></i></span>Employer Hub</button>
    <button class="sidebar-nav-item" id="sidebar-login-signup-btn" onclick="openAuth('login');closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-unlock"></i></span>Login / Signup</button>

    <div class="sidebar-user-block hidden" id="sidebar-user-block">
      <div class="sidebar-user-info">
        <div class="sidebar-user-avatar" id="sb-avatar"></div>
        <div class="sidebar-user-details">
          <div class="sidebar-user-name" id="sb-name"></div>
          <div class="sidebar-user-role" id="sb-role"></div>
        </div>

      </div>
          <button class="sidebar-signout-btn" onclick="logout();closeMobileSidebar()">
        <i class="fa-solid fa-right-from-bracket"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <section class="page active" id="page-profile">
      <div class="page-header">
        <div class="page-title">My Profile</div>
        <div class="page-subtitle">Manage your career profile and visibility</div>
      </div>

      <!-- ── Hero Banner ── -->
      <div class="profile-hero-banner">
        <div class="profile-hero-inner">
          <div class="profile-avatar-circle" id="prof-avatar"></div>
          <div style="flex:1;min-width:0">
            <div class="profile-display-name" id="prof-name"></div>
            <div class="profile-title" id="prof-title-sub"></div>
            <div class="profile-tag-list" id="prof-tag-list" style="margin-top:10px">
              <!-- filled by JS -->
            </div>
            <!-- Social / link buttons -->
            <div class="profile-links-row" id="prof-links-row" style="display:none">
              <!-- filled by JS -->
            </div>
          </div>
          <button class="edit-profile-btn" onclick="window.location.href='Profile_Edit.html'">
            <i class="fa-solid fa-pen"></i> Edit Profile
          </button>
        </div>
      </div>

      <!-- ── Two-column grid ── -->
      <div class="profile-two-col-grid">

        <!-- Left column -->
        <div>

          <!-- About / Bio -->
          <div class="card mb-16" id="prof-about-card" style="display:none">
            <div class="section-title"><i class="fa-solid fa-circle-info" style="color:var(--accent)"></i> About</div>
            <div class="bio-text" id="prof-bio-text"></div>
            <!-- Contact info row -->
            <div class="profile-info-grid" id="prof-info-grid" style="margin-top:12px"></div>
          </div>

          <!-- Work Experience -->
          <div class="card mb-16">
            <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
              <span><i class="fa-solid fa-briefcase" style="color:var(--accent)"></i> Work Experience</span>
              <a href="Profile_Edit.html" style="font-size:12px;color:var(--accent);text-decoration:none;font-weight:500">+ Add</a>
            </div>
            <div id="prof-experience-list">
              <div style="color:var(--text-secondary,#888);font-size:13px;text-align:center;padding:16px 0" id="prof-exp-empty">
                No experience added yet — <a href="Profile_Edit.html" style="color:var(--accent)">add some</a>
              </div>
            </div>
          </div>

          <!-- Education -->
          <div class="card">
            <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
              <span><i class="fa-solid fa-graduation-cap" style="color:var(--accent)"></i> Education</span>
              <a href="Profile_Edit.html" style="font-size:12px;color:var(--accent);text-decoration:none;font-weight:500">+ Add</a>
            </div>
            <div id="prof-education-list">
              <div style="color:var(--text-secondary,#888);font-size:13px;text-align:center;padding:16px 0" id="prof-edu-empty">
                No education added yet — <a href="Profile_Edit.html" style="color:var(--accent)">add some</a>
              </div>
            </div>
          </div>

        </div><!-- end left col -->

        <!-- Right column -->
        <div>

          <!-- Skills -->
          <div class="card mb-16">
            <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
              <span><i class="fa-solid fa-star" style="color:var(--accent)"></i> Skills</span>
              <a href="Profile_Edit.html" style="font-size:12px;color:var(--accent);text-decoration:none;font-weight:500">+ Edit</a>
            </div>
            <div class="skills-grid" id="prof-skills-grid">
              <span style="color:var(--text-secondary,#888);font-size:13px" id="prof-skills-empty">
                No skills added — <a href="Profile_Edit.html" style="color:var(--accent)">add some</a>
              </span>
            </div>
          </div>

          <!-- Profile Completeness -->
          <div class="card">
            <div class="section-title"><i class="fa-solid fa-chart-simple" style="color:var(--accent)"></i> Profile Strength</div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:13px;color:var(--text-secondary)">Completeness</span>
              <span style="font-size:18px;font-weight:700;color:var(--accent)" id="prof-completeness-pct">0%</span>
            </div>
            <div style="background:var(--border,rgba(0,0,0,.08));border-radius:99px;height:8px;overflow:hidden">
              <div id="prof-completeness-bar" style="height:100%;width:0;background:linear-gradient(90deg,var(--accent),#6c4ef7);border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)"></div>
            </div>
            <div style="margin-top:14px;display:flex;flex-direction:column;gap:6px" id="prof-completeness-checklist"></div>
          </div>

        </div><!-- end right col -->
      </div>

    </section>

  </main>
</div><!-- end app-layout -->


<!-- Mobile Bottom Nav -->
<nav class="mobile-bottom-nav">
  <button class="mobile-bottom-nav-item " onclick="window.location.href='dashboard.html'">
    <span class="mobile-nav-icon"><i class="fa-solid fa-house"></i></span>
    <span class="mobile-nav-label">Jobs</span>
  </button>
  <button class="mobile-bottom-nav-item " onclick="window.location.href='Save_job.html'">
    <span class="mobile-nav-icon"><i class="fa-solid fa-bookmark"></i></span>
    <span class="mobile-nav-label">Saved</span>
  </button>
  <button class="mobile-bottom-nav-item " onclick="window.location.href='cv_generator.html'">
    <span class="mobile-nav-icon"><i class="fa-solid fa-file-pdf"></i></span>
    <span class="mobile-nav-label">CV</span>
  </button>
  <button class="mobile-bottom-nav-item active" onclick="window.location.href='profile_page.html'">
    <span class="mobile-nav-icon"><i class="fa-solid fa-user"></i></span>
    <span class="mobile-nav-label">Profile</span>
  </button>
  <button class="mobile-bottom-nav-item" onclick="if(typeof logout==='function')logout();else{localStorage.clear();window.location.href='index.html';}">
    <span class="mobile-nav-icon"><i class="fa-solid fa-sign-out"></i></span>
    <span class="mobile-nav-label">Sign Out</span>
  </button>
</nav>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script src="js/guard.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await (initCommon && initCommon());
  Guard.requireLogin();

  await renderProfile();

  document.addEventListener('authRoleReady', async function(e) {
    if (e.detail) await renderProfile();
  }, { once: true });

  /* ══════════════════════════════════
     MAIN RENDER
  ══════════════════════════════════ */
  async function renderProfile() {
    // Check if viewing another user's profile via ?uid= param
    const urlParams = new URLSearchParams(window.location.search);
    const viewUid   = urlParams.get('uid');

    let user = (typeof AppState !== 'undefined' && AppState.currentUser)
             || (() => { try { const s = localStorage.getItem('tb_session'); return s ? JSON.parse(s) : null; } catch(e){} return null; })();
    if (!user) return;

    // If ?uid= is set AND it's a different user → load that profile instead
    if (viewUid && viewUid !== user.id) {
      try {
        const dbProfile = await DB.getProfile(viewUid);
        if (dbProfile) {
          // Show read-only profile — hide edit button
          const editBtn = document.querySelector('.edit-profile-btn');
          if (editBtn) editBtn.style.display = 'none';
          renderHero(dbProfile);
          renderAbout(dbProfile);
          renderSkills(dbProfile);
          renderExperience(dbProfile);
          renderEducation(dbProfile);
          renderCompleteness(dbProfile);
          return;
        }
      } catch(e) { /* fallback to own profile */ }
    }

    // Default: load own profile
    try {
      const dbProfile = await DB.getProfile(user.id);
      if (dbProfile) {
        user = Object.assign({}, user, dbProfile);
        if (typeof AppState !== 'undefined') AppState.currentUser = user;
      }
    } catch(e) { /* offline — fall back */ }

    renderHero(user);
    renderAbout(user);
    renderSkills(user);
    renderExperience(user);
    renderEducation(user);
    renderCompleteness(user);
  }

  /* ── Hero ── */
  function renderHero(user) {
    const profName   = document.getElementById('prof-name');
    const profSub    = document.getElementById('prof-title-sub');
    const profAvatar = document.getElementById('prof-avatar');
    const tagList    = document.getElementById('prof-tag-list');
    const linksRow   = document.getElementById('prof-links-row');

    if (profName)   profName.textContent   = user.name || 'User';
    if (profAvatar) profAvatar.textContent = user.avatar || (user.name||'U').slice(0,2).toUpperCase();

    const titleLabel = user.title
      ? user.title + (user.location ? ' · ' + user.location : '')
      : (user.role === 'employer' ? 'Employer Account' : 'Job Seeker');
    if (profSub) profSub.textContent = titleLabel;

    // Tags row
    if (tagList) {
      tagList.innerHTML = '';
      if (user.location) {
        tagList.innerHTML += `<span class="profile-tag"><i class="fa-solid fa-location-dot"></i> ${user.location}</span>`;
      }
      if (user.role) {
        const roleLabel = user.role === 'employer' ? 'Employer' : 'Job Seeker';
        tagList.innerHTML += `<span class="profile-tag"><i class="fa-solid fa-briefcase"></i> ${roleLabel}</span>`;
      }
      if (user.experienceYears) {
        tagList.innerHTML += `<span class="profile-tag"><i class="fa-solid fa-clock"></i> ${user.experienceYears}</span>`;
      }
      if (user.phone) {
        tagList.innerHTML += `<span class="profile-tag"><i class="fa-solid fa-phone"></i> ${user.phone}</span>`;
      }
    }

    // Links row
    if (linksRow) {
      linksRow.innerHTML = '';
      if (user.website) {
        linksRow.innerHTML += `<a href="${user.website}" target="_blank" rel="noopener" class="profile-link-btn"><i class="fa-solid fa-globe"></i> Portfolio</a>`;
      }
      if (user.linkedin) {
        linksRow.innerHTML += `<a href="${user.linkedin}" target="_blank" rel="noopener" class="profile-link-btn"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>`;
      }
      if (user.github) {
        linksRow.innerHTML += `<a href="${user.github}" target="_blank" rel="noopener" class="profile-link-btn"><i class="fa-brands fa-github"></i> GitHub</a>`;
      }
      linksRow.style.display = linksRow.innerHTML.trim() ? 'flex' : 'none';
    }
  }

  /* ── About / Bio ── */
  function renderAbout(user) {
    const card    = document.getElementById('prof-about-card');
    const bioText = document.getElementById('prof-bio-text');
    const infoGrid= document.getElementById('prof-info-grid');

    const hasBio = !!(user.bio && user.bio.trim());
    const hasInfo = !!(user.email || user.phone || user.website || user.linkedin || user.github);

    if (!card) return;
    if (!hasBio && !hasInfo) { card.style.display = 'none'; return; }
    card.style.display = '';

    if (bioText) {
      bioText.style.display = hasBio ? '' : 'none';
      bioText.textContent = user.bio || '';
    }

    if (infoGrid) {
      infoGrid.innerHTML = '';
      const items = [
        { icon: 'fa-envelope',       label: user.email,   href: user.email    ? 'mailto:'+user.email    : null },
        { icon: 'fa-phone',          label: user.phone,   href: user.phone    ? 'tel:'+user.phone       : null },
        { icon: 'fa-globe',          label: 'Portfolio',  href: user.website  || null },
        { icon: 'fa-brands fa-linkedin', label: 'LinkedIn', href: user.linkedin || null },
        { icon: 'fa-brands fa-github',   label: 'GitHub',   href: user.github   || null },
      ].filter(i => i.href);

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'profile-info-item';
        div.innerHTML = `<i class="fa-solid ${item.icon}"></i>
          <a href="${item.href}" target="${item.href.startsWith('http') ? '_blank' : '_self'}" rel="noopener">${item.label}</a>`;
        infoGrid.appendChild(div);
      });
    }
  }

  /* ── Skills ── */
  function renderSkills(user) {
    const grid  = document.getElementById('prof-skills-grid');
    const empty = document.getElementById('prof-skills-empty');
    if (!grid) return;

    const raw = user.skills;
    let skills = [];
    if (Array.isArray(raw) && raw.length) {
      skills = raw.map(s => typeof s === 'string' ? { name: s, level: '' } : s);
    } else if (typeof raw === 'string' && raw.trim()) {
      skills = raw.split(',').map(s => ({ name: s.trim(), level: '' })).filter(s => s.name);
    }

    grid.querySelectorAll('.skill-chip-dyn').forEach(el => el.remove());

    if (!skills.length) { if (empty) empty.style.display = ''; return; }
    if (empty) empty.style.display = 'none';

    const levelColor = { Expert:'green', Advanced:'green', Intermediate:'', Beginner:'orange' };
    skills.forEach(skill => {
      const chip = document.createElement('span');
      const cls  = levelColor[skill.level] || '';
      chip.className = 'skill-chip skill-chip-dyn' + (cls ? ' ' + cls : '');
      chip.title = skill.level || '';
      chip.textContent = skill.name;
      grid.appendChild(chip);
    });
  }

  /* ── Experience ── */
  function renderExperience(user) {
    const list  = document.getElementById('prof-experience-list');
    const empty = document.getElementById('prof-exp-empty');
    if (!list) return;

    const exps = Array.isArray(user.experience) ? user.experience : [];
    list.querySelectorAll('.timeline-item-dyn').forEach(el => el.remove());

    if (!exps.length) { if (empty) empty.style.display = ''; return; }
    if (empty) empty.style.display = 'none';

    exps.forEach(exp => {
      const endLabel = exp.current ? 'Present' : (exp.endDate || '');
      const period   = [exp.startDate, endLabel].filter(Boolean).join(' – ');
      const div = document.createElement('div');
      div.className = 'timeline-item timeline-item-dyn';
      div.innerHTML = `
        <div class="timeline-dot"><i class="fa-solid fa-briefcase"></i></div>
        <div>
          <div class="timeline-title">${exp.title || ''}</div>
          <div class="timeline-sub">${exp.company || ''}</div>
          ${exp.location ? `<div class="timeline-sub" style="font-size:12px;opacity:.7">${exp.location}</div>` : ''}
          <div class="timeline-period">${period}</div>
          ${exp.description ? `<div style="font-size:13px;color:var(--text-secondary,#888);margin-top:6px;line-height:1.5">${exp.description}</div>` : ''}
        </div>`;
      list.appendChild(div);
    });
  }

  /* ── Education ── */
  function renderEducation(user) {
    const list  = document.getElementById('prof-education-list');
    const empty = document.getElementById('prof-edu-empty');
    if (!list) return;

    const edus = Array.isArray(user.education) ? user.education : [];
    list.querySelectorAll('.timeline-item-dyn').forEach(el => el.remove());

    if (!edus.length) { if (empty) empty.style.display = ''; return; }
    if (empty) empty.style.display = 'none';

    edus.forEach(edu => {
      const endLabel = edu.current ? 'Present' : (edu.endYear || '');
      const period   = [edu.startYear, endLabel].filter(Boolean).join(' – ');
      const div = document.createElement('div');
      div.className = 'timeline-item timeline-item-dyn';
      div.innerHTML = `
        <div class="timeline-dot"><i class="fa-solid fa-graduation-cap"></i></div>
        <div>
          <div class="timeline-title">${edu.degree || ''}${edu.field ? ' — ' + edu.field : ''}</div>
          <div class="timeline-sub">${edu.institution || ''}</div>
          ${edu.grade ? `<div class="timeline-sub" style="font-size:12px;opacity:.7">Grade: ${edu.grade}</div>` : ''}
          <div class="timeline-period">${period}</div>
          ${edu.description ? `<div style="font-size:13px;color:var(--text-secondary,#888);margin-top:6px;line-height:1.5">${edu.description}</div>` : ''}
        </div>`;
      list.appendChild(div);
    });
  }

  /* ── Profile Completeness ── */
  function renderCompleteness(user) {
    const checks = [
      { label: 'Full name',        done: !!user.name },
      { label: 'Email',            done: !!user.email },
      { label: 'Professional title', done: !!user.title },
      { label: 'Location',         done: !!user.location },
      { label: 'Bio / Summary',    done: !!user.bio },
      { label: 'Skills added',     done: (Array.isArray(user.skills) ? user.skills.length : 0) > 0 },
      { label: 'Work experience',  done: (Array.isArray(user.experience) ? user.experience.length : 0) > 0 },
      { label: 'Education',        done: (Array.isArray(user.education) ? user.education.length : 0) > 0 },
      { label: 'Phone number',     done: !!user.phone },
      { label: 'Portfolio / Links', done: !!(user.website || user.linkedin || user.github) },
    ];
    const pct = Math.round((checks.filter(c => c.done).length / checks.length) * 100);

    const pctEl  = document.getElementById('prof-completeness-pct');
    const barEl  = document.getElementById('prof-completeness-bar');
    const listEl = document.getElementById('prof-completeness-checklist');

    if (pctEl) pctEl.textContent = pct + '%';
    if (barEl) setTimeout(() => barEl.style.width = pct + '%', 200);

    if (listEl) {
      listEl.innerHTML = '';
      checks.forEach(c => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:12.5px';
        row.innerHTML = c.done
          ? `<i class="fa-solid fa-circle-check" style="color:#22c55e;font-size:13px"></i><span style="color:var(--text-secondary)">${c.label}</span>`
          : `<i class="fa-regular fa-circle" style="color:var(--border,#ddd);font-size:13px"></i><span style="color:var(--text-muted,#aaa)">${c.label}</span>`;
        listEl.appendChild(row);
      });
    }
  }
});
</script>
</body>
</html>
