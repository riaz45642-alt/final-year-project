<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentBridge — CV Generator</title>
  <!-- Georgia & Arial are system fonts — no import needed, render perfectly in PDF -->
  <style>
    /* Ensure Georgia/Arial used for CV content throughout */
    #cv-preview-panel { font-family: Georgia, 'Times New Roman', serif; }
  </style>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/cv.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- html2canvas + jsPDF for direct PDF download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="toast-container"></div>
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box" id="auth-modal-box"></div>
</div>

<!-- TOP NAV -->
<nav class="top-nav">
  <button class="mobile-menu-toggle" id="mobile-menu-toggle" onclick="toggleMobileSidebar()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
  <div class="site-logo site-logo-center" onclick="window.location.href='dashboard.html'">Talent<span>Bridge</span></div>
  <div class="nav-links">
    <div class="nav-divider"></div>
    <div id="nav-logged-out" class="nav-auth-buttons">
      <button class="nav-link-btn" onclick="openAuth('login')">Sign In</button>
      <button class="nav-link-btn primary" onclick="openAuth('signup')">Sign Up Free</button>
    </div>
    <div id="nav-logged-in" class="nav-user-menu hidden">
      <div class="user-avatar-btn" id="nav-avatar-btn" onclick="window.location.href='profile_page.html'" title="My Profile">
        <span id="nav-avatar-initials">AK</span>
      </div>
    </div>
  </div>
</nav>

<div class="mobile-sidebar-overlay" id="mobile-sidebar-overlay" onclick="closeMobileSidebar()"></div>

<div class="app-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section-label">Main</div>
    <button class="sidebar-nav-item" onclick="window.location.href='dashboard.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-house"></i></span>Job Feed</button>
    <button class="sidebar-nav-item" data-role="seeker" onclick="window.location.href='Save_job.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-bookmark"></i></span>Saved Jobs<span class="badge" id="sb-saved-count">0</span></button>
    <button class="sidebar-nav-item" data-role="seeker" onclick="window.location.href='My_applications.html';closeMobileSidebar()"><span class="nav-icon"></span>My Applications<span class="badge" id="sb-applied-count">0</span></button>
    <div class="sidebar-section-label">Tools</div>
    <button class="sidebar-nav-item active" onclick="window.location.href='cv_generator.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-file"></i></span>CV Generator</button>
    <div class="sidebar-section-label">Account</div>
    <button class="sidebar-nav-item" onclick="window.location.href='profile_page.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-user"></i></span>My Profile</button>
    <button class="sidebar-nav-item" data-role="employer" onclick="window.location.href='Employer_dashboard.html';closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-address-card"></i></span>Employer Hub</button>
    <button class="sidebar-nav-item" id="sidebar-login-signup-btn" onclick="openAuth('login');closeMobileSidebar()"><span class="nav-icon"><i class="fa-solid fa-unlock"></i></span>Login / Signup</button>
    <div class="sidebar-user-block hidden" id="sidebar-user-block">
      <div class="sidebar-user-info">
        <div class="sidebar-user-avatar" id="sb-avatar">AK</div>
        <div class="sidebar-user-details">
          <div class="sidebar-user-name" id="sb-name">Ahmed Khan</div>
          <div class="sidebar-user-role" id="sb-role">Job Seeker</div>
        </div>
        <div class="role-toggle-wrap" title="Switch to Employer / Job Seeker">
          <span class="role-toggle-label" id="toggle-label-left">JS</span>
          <label class="role-toggle-switch">
            <input type="checkbox" id="role-toggle-checkbox" onchange="handleRoleToggle(this.checked)">
            <span class="role-toggle-slider"></span>
          </label>
          <span class="role-toggle-label" id="toggle-label-right">EM</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <section class="page active" id="page-cv">
      <div class="page-header">
        <div class="page-title">CV Generator</div>
        <div class="page-subtitle">Build a professional CV and download it as PDF in seconds</div>
      </div>
      <div class="cv-builder-layout">
        <!-- FORM LEFT -->
        <div>
          <div class="card">
            <!-- Template Selector -->
            <div class="form-section">
              <div class="form-section-title"><span class="num">0</span>Choose Template</div>
              <div id="template-selector" class="template-grid"></div>
            </div>

            <!-- Personal Info -->
            <div class="form-section">
              <div class="form-section-title"><span class="num">1</span>Personal Information</div>
              <div class="cv-form-row">
                <div class="cv-form-group"><label>First Name</label><input type="text" id="cv-fname" data-cv-field placeholder="Ahmed" value="Ahmed"></div>
                <div class="cv-form-group"><label>Last Name</label><input type="text" id="cv-lname" data-cv-field placeholder="Khan" value="Khan"></div>
              </div>
              <div class="cv-form-group"><label>Professional Title</label><input type="text" id="cv-job-title" data-cv-field placeholder="Full Stack Developer" value="Full Stack Developer"></div>
              <div class="cv-form-row">
                <div class="cv-form-group"><label>Email</label><input type="email" id="cv-email" data-cv-field placeholder="ahmed@email.com" value="ahmed@email.com"></div>
                <div class="cv-form-group"><label>Phone</label><input type="tel" id="cv-phone" data-cv-field placeholder="+92 300 1234567" value="+92 300 1234567"></div>
              </div>
              <div class="cv-form-row">
                <div class="cv-form-group"><label>Location</label><input type="text" id="cv-loc" data-cv-field placeholder="Lahore, Pakistan" value="Lahore, Pakistan"></div>
                <div class="cv-form-group"><label>LinkedIn (optional)</label><input type="text" id="cv-linkedin" placeholder="linkedin.com/in/your-profile"></div>
              </div>
              <div class="cv-form-group"><label>Professional Summary</label><textarea id="cv-summary" data-cv-field rows="3">Experienced Full Stack Developer with 4+ years building scalable web applications using React, Node.js, and cloud technologies. Passionate about clean code and user experience.</textarea></div>
            </div>

            <!-- Education -->
            <div class="form-section">
              <div class="form-section-title"><span class="num">2</span>Education</div>
              <div id="edu-entries"></div>
              <button class="btn btn-outline btn-sm" onclick="addEducation()">+ Add Education</button>
            </div>

            <!-- Experience -->
            <div class="form-section">
              <div class="form-section-title"><span class="num">3</span>Work Experience</div>
              <div id="exp-entries"></div>
              <button class="btn btn-outline btn-sm" onclick="addExperience()">+ Add Experience</button>
            </div>

            <!-- Skills -->
            <div class="form-section">
              <div class="form-section-title"><span class="num">4</span>Skills</div>
              <div class="cv-form-group">
                <label>Technical Skills</label>
                <div class="skill-tags-wrap" id="skill-tags-wrap" onclick="focusSkillInput()"></div>
              </div>
            </div>

            <!-- Action buttons: only Download + Save -->
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
              <button class="btn btn-success" id="download-cv-btn" onclick="downloadCV()"><i class="fa-solid fa-file-arrow-down"></i> Download CV as PDF</button>
              <button class="btn btn-primary" onclick="saveCVToBackend()"><i class="fa-solid fa-floppy-disk"></i> Save CV</button>
            </div>
          </div>
        </div>

        <!-- CV PREVIEW RIGHT -->
        <div>
          <div id="cv-preview-panel" class="cv-preview tpl-classic">
            <!-- rendered by renderPreviewHTML() -->
          </div>
          <div style="margin-top:12px;">
            <button class="btn btn-success btn-full" onclick="downloadCV()"><i class="fa-solid fa-file-arrow-down"></i> Download as PDF</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/script.js"></script>
<script src="js/guard.js"></script>
<script src="js/cv_generator.js"></script>
<script src="js/auth.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await initCommon();
    Guard.requireLogin();
    await initCVGenerator();
    document.addEventListener('authRoleReady', async function(e) {
      if (e.detail) await initCVGenerator();
    }, { once: true });
  });
</script>
</body>
</html>
